<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>KERM-MD-V1 | PREMIUM PAIR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
    --bg:#040816;
    --bg2:#0d1328;
    --card:rgba(15,20,40,.78);

    --primary:#6ee7ff;
    --secondary:#7c4dff;
    --accent:#00ffb3;
    --danger:#ff4d9d;

    --text:#f4f7ff;
    --muted:#98a6c8;

    --border:rgba(255,255,255,.08);

    --shadow:
    0 25px 80px rgba(0,0,0,.45),
    0 0 50px rgba(110,231,255,.08);

    --radius:30px;

    --transition:.35s cubic-bezier(.4,0,.2,1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    position:relative;
}

/* BACKGROUND */

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(124,77,255,.22), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,255,179,.10), transparent 30%),
    radial-gradient(circle at center, rgba(110,231,255,.08), transparent 45%);
    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:42px 42px;
    z-index:-2;
}

.blur{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
    animation:floatGlow 7s ease-in-out infinite alternate;
}

.blur1{
    width:350px;
    height:350px;
    background:#00d4ff25;
    top:-100px;
    left:-100px;
}

.blur2{
    width:300px;
    height:300px;
    background:#7c4dff30;
    right:-100px;
    bottom:-100px;
}

@keyframes floatGlow{
    0%{
        transform:translateY(0) scale(1);
    }
    100%{
        transform:translateY(-25px) scale(1.1);
    }
}

/* WRAPPER */

.wrapper{
    width:100%;
    max-width:540px;
}

.container{
    position:relative;
    overflow:hidden;

    background:var(--card);
    backdrop-filter:blur(24px);

    border:1px solid var(--border);

    border-radius:var(--radius);

    padding:32px;

    box-shadow:var(--shadow);
}

.container::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,.05),
    transparent 25%
    );
    pointer-events:none;
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.home-btn{
    width:50px;
    height:50px;
    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    color:var(--text);

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    transition:var(--transition);
}

.home-btn:hover{
    transform:translateY(-4px);

    background:rgba(110,231,255,.08);

    color:var(--primary);

    box-shadow:0 0 20px rgba(110,231,255,.2);
}

.status{
    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 16px;

    border-radius:999px;

    background:rgba(0,255,179,.08);

    border:1px solid rgba(0,255,179,.18);

    color:var(--accent);

    font-size:.82rem;
    font-weight:700;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--accent);

    box-shadow:0 0 12px var(--accent);

    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.4);
    }
}

/* LOGO */

.logo-wrap{
    width:120px;
    height:120px;

    position:relative;

    margin:auto;
    margin-bottom:28px;
}

.logo-wrap::before{
    content:'';
    position:absolute;
    inset:-6px;

    border-radius:50%;

    background:conic-gradient(
    from 0deg,
    var(--primary),
    var(--secondary),
    var(--accent),
    var(--primary)
    );

    animation:spin 5s linear infinite;
}

.logo-wrap::after{
    content:'';
    position:absolute;
    inset:5px;

    border-radius:50%;

    background:var(--bg2);
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.logo{
    position:relative;
    z-index:2;

    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;
}

/* TEXT */

h1{
    text-align:center;

    font-family:'Orbitron',sans-serif;

    font-size:2rem;

    margin-bottom:10px;

    background:linear-gradient(
    90deg,
    var(--primary),
    white
    );

    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    text-align:center;

    color:var(--muted);

    line-height:1.7;

    margin-bottom:30px;
}

/* INPUT AREA */

.form-box{
    display:flex;
    gap:12px;
    margin-bottom:28px;
}

.input-box{
    position:relative;
    flex:1;
}

.input-box i{
    position:absolute;
    top:50%;
    left:18px;

    transform:translateY(-50%);

    color:var(--primary);
}

.input{
    width:100%;
    height:64px;

    border-radius:18px;

    border:1px solid rgba(255,255,255,.08);

    background:rgba(255,255,255,.04);

    color:var(--text);

    padding:0 18px 0 50px;

    font-size:1rem;

    outline:none;

    transition:var(--transition);
}

.input:focus{
    border-color:rgba(110,231,255,.35);

    box-shadow:
    0 0 0 4px rgba(110,231,255,.08),
    0 0 25px rgba(110,231,255,.12);
}

.input::placeholder{
    color:#8190b4;
}

/* BUTTON */

.btn{
    min-width:170px;
    height:64px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    position:relative;

    overflow:hidden;

    font-family:'Orbitron',sans-serif;

    font-weight:700;

    letter-spacing:1px;

    background:
    linear-gradient(
    135deg,
    var(--primary),
    var(--secondary)
    );

    color:white;

    transition:var(--transition);
}

.btn:hover{
    transform:translateY(-3px);

    box-shadow:
    0 15px 35px rgba(124,77,255,.35);
}

.btn::before{
    content:'';

    position:absolute;
    inset:0;

    transform:translateX(-100%);

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.25),
    transparent
    );

    transition:.7s;
}

.btn:hover::before{
    transform:translateX(100%);
}

/* FEATURES */

.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:12px;

    margin-bottom:25px;
}

.feature{
    background:rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.05);

    border-radius:18px;

    padding:16px;

    text-align:center;

    transition:var(--transition);
}

.feature:hover{
    transform:translateY(-4px);

    background:rgba(110,231,255,.05);
}

.feature i{
    color:var(--primary);

    font-size:1.1rem;

    margin-bottom:10px;
}

.feature span{
    display:block;

    color:var(--muted);

    font-size:.8rem;
}

/* RESULT */

.result{
    margin-top:28px;

    display:none;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.05);

    border-radius:26px;

    padding:28px;

    animation:show .5s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.result-title{
    text-align:center;

    color:var(--muted);

    margin-bottom:18px;
}

/* FIXED CODE DISPLAY */

.code{
    width:100%;

    overflow-x:auto;
    overflow-y:hidden;

    white-space:nowrap;

    text-align:center;

    padding:18px 16px;

    border-radius:18px;

    background:rgba(0,0,0,.22);

    border:1px solid rgba(255,255,255,.05);

    font-family:'Orbitron',sans-serif;

    font-size:2rem;
    font-weight:800;

    letter-spacing:5px;

    color:var(--primary);

    margin-bottom:20px;

    scrollbar-width:none;
}

.code::-webkit-scrollbar{
    display:none;
}

/* ACTIONS */

.actions{
    display:flex;
    gap:12px;
}

.action-btn{
    flex:1;

    height:56px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    font-weight:700;

    transition:var(--transition);

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    font-size:.95rem;
}

.copy{
    background:
    linear-gradient(
    135deg,
    var(--accent),
    #00d38f
    );

    color:#05150e;
}

.copy:hover{
    transform:translateY(-3px);
}

.back{
    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    color:white;
}

.back:hover{
    background:rgba(255,255,255,.08);
}

/* FOOTER */

.footer{
    margin-top:25px;

    text-align:center;

    color:var(--muted);

    font-size:.9rem;
}

.socials{
    margin-top:15px;

    display:flex;
    justify-content:center;
    gap:14px;
}

.social{
    width:45px;
    height:45px;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    color:white;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.05);

    transition:var(--transition);
}

.social:hover{
    transform:translateY(-4px);

    background:rgba(110,231,255,.08);

    color:var(--primary);
}

/* LOADER */

.loader{
    width:22px;
    height:22px;

    border:3px solid rgba(255,255,255,.25);
    border-top:3px solid white;

    border-radius:50%;

    animation:spin 1s linear infinite;

    display:none;

    margin:auto;
}

/* RESPONSIVE */

@media(max-width:650px){

    body{
        padding:18px;
    }

    .container{
        padding:24px;
    }

    .form-box{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

    .features{
        grid-template-columns:1fr;
    }

    .actions{
        flex-direction:column;
    }

    h1{
        font-size:1.5rem;
    }

    .code{
        font-size:1.45rem;
        letter-spacing:3px;
    }

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="wrapper">

<h1>KERM MD PAIR</h1>

type="tel"
inputmode="numeric"
pattern="[0-9]*"
autocomplete="off"

id="phone-number"

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.8/axios.min.js"></script>

<script>

const submit = document.getElementById('submit');
const btnText = document.getElementById('btnText');
const loader = document.getElementById('loader');

const result = document.getElementById('result');
const pairCode = document.getElementById('pair-code');

const copyBtn = document.getElementById('copy-btn');
const copyText = document.getElementById('copy-text');

const phoneInput = document.getElementById('phone-number');

/* INPUT ONLY NUMBERS */

phoneInput.addEventListener('input',(e)=>{

e.target.value = e.target.value.replace(/\D/g,'');

});

/* GENERATE */

submit.addEventListener('click', async ()=>{

const number = phoneInput.value.trim();

if(!number || number.length < 10){

phoneInput.style.borderColor = '#ff4d9d';

phoneInput.focus();

setTimeout(()=>{
phoneInput.style.borderColor = '';
},1500);

return;

}

btnText.style.display='none';
loader.style.display='block';

submit.disabled = true;

try{

const { data } = await axios.get(`/code?number=${number}`);

result.style.display='block';

pairCode.textContent = data.code || 'ERROR';

result.scrollIntoView({
behavior:'smooth',
block:'nearest'
});

}catch(err){

result.style.display='block';

pairCode.textContent = 'SERVICE ERROR';

}

btnText.style.display='block';
loader.style.display='none';

submit.disabled = false;

});

/* COPY */

copyBtn.addEventListener('click', async ()=>{

try{

await navigator.clipboard.writeText(pairCode.textContent);

copyText.innerText = 'COPIED';

copyBtn.innerHTML = `
<i class="fas fa-check"></i>
<span id="copy-text">COPIED</span>
`;

setTimeout(()=>{

copyBtn.innerHTML = `
<i class="fas fa-copy"></i>
<span id="copy-text">COPY CODE</span>
`;

},2000);

}catch{

copyBtn.innerHTML = `
<i class="fas fa-xmark"></i>
<span>FAILED</span>
`;

}

});

</script>
