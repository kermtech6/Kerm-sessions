<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERM-MD-V1 | PREMIUM PAIR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
    --bg:#050816;
    --bg2:#0c1225;
    --card:rgba(15,20,40,.72);
    --border:rgba(255,255,255,.08);

    --primary:#6ee7ff;
    --secondary:#7c4dff;
    --accent:#00ffa3;
    --danger:#ff4d9d;

    --text:#ecf3ff;
    --muted:#9ba9c9;

    --shadow:
    0 20px 80px rgba(0,0,0,.45),
    0 0 50px rgba(110,231,255,.08);

    --radius:28px;
    --transition:.35s cubic-bezier(.4,0,.2,1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    position:relative;
}

/* BACKGROUND */

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(124,77,255,.25), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,255,163,.12), transparent 30%),
    radial-gradient(circle at center, rgba(110,231,255,.08), transparent 40%);
    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:45px 45px;
    z-index:-2;
}

.blur{
    position:fixed;
    border-radius:50%;
    filter:blur(100px);
    z-index:-1;
    animation:floatGlow 8s infinite ease-in-out alternate;
}

.blur1{
    width:400px;
    height:400px;
    background:#00d4ff25;
    top:-100px;
    left:-100px;
}

.blur2{
    width:350px;
    height:350px;
    background:#7c4dff25;
    bottom:-100px;
    right:-100px;
}

@keyframes floatGlow{
    0%{
        transform:translateY(0) scale(1);
    }
    100%{
        transform:translateY(-20px) scale(1.1);
    }
}

/* CONTAINER */

.wrapper{
    width:100%;
    max-width:520px;
    position:relative;
}

.container{
    background:var(--card);
    backdrop-filter:blur(25px);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:40px;
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow);
}

.container::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(135deg,
    rgba(255,255,255,.04),
    transparent 30%);
    pointer-events:none;
}

/* TOP */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.home-btn{
    width:48px;
    height:48px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:var(--text);
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    transition:var(--transition);
}

.home-btn:hover{
    transform:translateY(-4px);
    background:rgba(110,231,255,.1);
    color:var(--primary);
    box-shadow:0 0 25px rgba(110,231,255,.2);
}

.status{
    padding:10px 16px;
    border-radius:999px;
    background:rgba(0,255,163,.08);
    border:1px solid rgba(0,255,163,.2);
    color:var(--accent);
    font-size:.8rem;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 12px var(--accent);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.4);}
}

/* LOGO */

.logo-wrap{
    position:relative;
    width:120px;
    height:120px;
    margin:auto;
    margin-bottom:30px;
}

.logo-wrap::before{
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background:conic-gradient(
    from 0deg,
    var(--primary),
    var(--secondary),
    var(--accent),
    var(--primary)
    );
    animation:spin 5s linear infinite;
}

.logo-wrap::after{
    content:'';
    position:absolute;
    inset:4px;
    background:var(--bg2);
    border-radius:50%;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.logo{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

/* TEXT */

h1{
    text-align:center;
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    margin-bottom:10px;
    background:linear-gradient(90deg,var(--primary),white);
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:35px;
    line-height:1.7;
}

/* INPUT */

.label{
    margin-bottom:12px;
    display:block;
    color:#cfe6ff;
    font-weight:600;
    font-size:.92rem;
}

.input-box{
    position:relative;
    margin-bottom:25px;
}

.input-box i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:var(--primary);
    font-size:1rem;
}

.input{
    width:100%;
    height:65px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.04);
    outline:none;
    padding:0 20px 0 55px;
    color:var(--text);
    font-size:1rem;
    transition:var(--transition);
}

.input:focus{
    border-color:rgba(110,231,255,.4);
    box-shadow:
    0 0 0 5px rgba(110,231,255,.08),
    0 0 25px rgba(110,231,255,.15);
}

/* FEATURES */

.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:28px;
}

.feature{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px;
    padding:16px;
    text-align:center;
    transition:var(--transition);
}

.feature:hover{
    transform:translateY(-4px);
    background:rgba(110,231,255,.06);
}

.feature i{
    font-size:1.2rem;
    margin-bottom:8px;
    color:var(--primary);
}

.feature span{
    display:block;
    font-size:.75rem;
    color:var(--muted);
}

/* BUTTON */

.btn{
    width:100%;
    height:64px;
    border:none;
    border-radius:18px;
    background:linear-gradient(
    135deg,
    var(--primary),
    var(--secondary)
    );
    color:white;
    font-family:'Orbitron',sans-serif;
    font-size:.95rem;
    letter-spacing:2px;
    cursor:pointer;
    transition:var(--transition);
    position:relative;
    overflow:hidden;
    font-weight:700;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:
    0 20px 40px rgba(124,77,255,.35);
}

.btn::before{
    content:'';
    position:absolute;
    inset:0;
    transform:translateX(-100%);
    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.25),
    transparent
    );
    transition:.7s;
}

.btn:hover::before{
    transform:translateX(100%);
}

/* RESULT */

.result{
    margin-top:30px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:30px;
    display:none;
    animation:show .5s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.result-title{
    text-align:center;
    color:var(--muted);
    margin-bottom:18px;
}

.code{
    font-family:'Orbitron',sans-serif;
    text-align:center;
    font-size:2.2rem;
    font-weight:800;
    letter-spacing:6px;
    background:linear-gradient(90deg,var(--primary),white);
    -webkit-background-clip:text;
    color:transparent;
    margin-bottom:22px;
}

.actions{
    display:flex;
    gap:12px;
}

.action-btn{
    flex:1;
    height:55px;
    border-radius:16px;
    border:none;
    cursor:pointer;
    font-weight:700;
    transition:var(--transition);
}

.copy{
    background:linear-gradient(135deg,var(--accent),#00d68f);
    color:#04110d;
}

.copy:hover{
    transform:translateY(-3px);
}

.back{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    color:white;
}

.back:hover{
    background:rgba(255,255,255,.08);
}

/* FOOTER */

.footer{
    margin-top:25px;
    text-align:center;
    color:var(--muted);
    font-size:.9rem;
}

.socials{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:14px;
}

.social{
    width:45px;
    height:45px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);
    transition:var(--transition);
}

.social:hover{
    transform:translateY(-4px);
    background:rgba(110,231,255,.08);
    color:var(--primary);
}

/* LOADING */

.loader{
    width:22px;
    height:22px;
    border:3px solid rgba(255,255,255,.25);
    border-top:3px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:none;
    margin:auto;
}

/* RESPONSIVE */

@media(max-width:600px){

    .container{
        padding:25px;
    }

    .features{
        grid-template-columns:1fr;
    }

    h1{
        font-size:1.5rem;
    }

    .actions{
        flex-direction:column;
    }

}

</style>
</head>
<body>

<div class="grid"></div>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="wrapper">

<div class="container">

<div class="topbar">

<a href="./" class="home-btn">
<i class="fas fa-arrow-left"></i>
</a>

<div class="status">
<div class="dot"></div>
ONLINE
</div>

</div>

<div class="logo-wrap">
<img class="logo" src="https://raw.githubusercontent.com/kermtech6/logo/refs/heads/main/56C67450-A2D2-468E-B0CB-A76D4D48AE37.png">
</div>

<h1>KERM MD PAIR</h1>

<p class="subtitle">
Generate your secure WhatsApp pairing code instantly with the futuristic KERM-MD-V1 interface.
</p>

<label class="label">PHONE NUMBER</label>

<div class="input-box">
<i class="fas fa-phone"></i>
<input type="text" class="input" id="phone-number" placeholder="237xxxxxxxx">
</div>

<div class="features">

<div class="feature">
<i class="fas fa-shield-halved"></i>
<span>Encrypted</span>
</div>

<div class="feature">
<i class="fas fa-bolt"></i>
<span>Fast Pair</span>
</div>

<div class="feature">
<i class="fas fa-server"></i>
<span>Stable</span>
</div>

</div>

<button class="btn" id="submit">

<span id="btnText">
GENERATE CODE
</span>

<div class="loader" id="loader"></div>

</button>

<div class="result" id="result">

<div class="result-title">
Your secure pairing code
</div>

<div class="code" id="pair-code">
KERM-22
</div>

<div class="actions">

<button class="action-btn copy" id="copy-btn">
<i class="fas fa-copy"></i>
COPY
</button>

<a href="./" style="text-decoration:none;flex:1;">
<button class="action-btn back">
<i class="fas fa-home"></i>
HOME
</button>
</a>

</div>

</div>

</div>

<div class="footer">

<p>
© 2026 KERM TECH — PREMIUM WHATSAPP AUTOMATION
</p>

<div class="socials">

<a href="https://github.com/kermtech6/KERM-MD-V1" class="social">
<i class="fab fa-github"></i>
</a>

<a href="https://t.me/lord_kerm" class="social">
<i class="fab fa-telegram"></i>
</a>

<a href="https://whatsapp.com/channel/0029VbCgEqc0bIdmRMLots12" class="social">
<i class="fab fa-whatsapp"></i>
</a>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.8/axios.min.js"></script>

<script>

const submit = document.getElementById('submit');
const btnText = document.getElementById('btnText');
const loader = document.getElementById('loader');
const result = document.getElementById('result');
const pairCode = document.getElementById('pair-code');
const copyBtn = document.getElementById('copy-btn');
const phoneInput = document.getElementById('phone-number');

submit.addEventListener('click', async () => {

const number = phoneInput.value.trim();

if(!number || number.length < 10){

phoneInput.style.borderColor = '#ff4d9d';

setTimeout(()=>{
phoneInput.style.borderColor = '';
},1500);

return;
}

btnText.style.display='none';
loader.style.display='block';

submit.disabled = true;

try{

const { data } = await axios.get(`/code?number=${number}`);

result.style.display='block';

pairCode.textContent = data.code || 'ERROR';

result.scrollIntoView({
behavior:'smooth'
});

}catch(err){

result.style.display='block';

pairCode.textContent = 'SERVICE ERROR';

}

btnText.style.display='block';
loader.style.display='none';

submit.disabled = false;

});

copyBtn.addEventListener('click',()=>{

navigator.clipboard.writeText(pairCode.textContent);

copyBtn.innerHTML = `
<i class="fas fa-check"></i>
COPIED
`;

setTimeout(()=>{
copyBtn.innerHTML = `
<i class="fas fa-copy"></i>
COPY
`;
},2000);

});

phoneInput.addEventListener('input',(e)=>{
e.target.value = e.target.value.replace(/\D/g,'');
});

</script>

</body>
</html>
