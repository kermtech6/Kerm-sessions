<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KERM MD V1 | WHATSAPP BOT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root{
            --primary:#7c4dff;
            --primary-2:#00e5ff;
            --secondary:#14f195;
            --accent:#ff3cac;

            --dark:#050816;
            --darker:#02040d;

            --card-bg:rgba(14,18,35,0.62);
            --card-bg-2:rgba(20,25,45,0.45);

            --card-border:rgba(255,255,255,0.08);

            --text:#f5f7ff;
            --text-muted:#9aa4bf;

            --shadow:
                0 10px 40px rgba(0,0,0,.45),
                0 0 80px rgba(124,77,255,.12);

            --transition:all .45s cubic-bezier(.4,0,.2,1);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            font-family:'Inter',sans-serif;
            background:
                radial-gradient(circle at top left, rgba(124,77,255,.15), transparent 30%),
                radial-gradient(circle at bottom right, rgba(0,229,255,.12), transparent 30%),
                linear-gradient(180deg,#050816 0%,#040611 100%);
            color:var(--text);
            overflow-x:hidden;
            min-height:100vh;
            line-height:1.6;
        }

        h1,h2,h3,h4,h5,h6{
            font-family:'Orbitron',sans-serif;
        }

        /* =========================
           BACKGROUND
        ========================= */

        .bg-grid{
            position:fixed;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size:50px 50px;
            mask-image:linear-gradient(to bottom, rgba(255,255,255,.8), transparent);
            z-index:-3;
        }

        .bg-glow{
            position:fixed;
            border-radius:50%;
            filter:blur(120px);
            z-index:-2;
            animation:pulse 8s ease-in-out infinite;
        }

        .bg-glow-1{
            top:-10%;
            left:-5%;
            width:450px;
            height:450px;
            background:rgba(124,77,255,.22);
        }

        .bg-glow-2{
            bottom:-15%;
            right:-10%;
            width:450px;
            height:450px;
            background:rgba(0,229,255,.18);
            animation-delay:2s;
        }

        .bg-glow-3{
            top:40%;
            left:45%;
            width:350px;
            height:350px;
            background:rgba(255,60,172,.12);
            animation-delay:4s;
        }

        @keyframes pulse{
            0%,100%{
                transform:scale(1);
                opacity:.5;
            }
            50%{
                transform:scale(1.15);
                opacity:.85;
            }
        }

        /* =========================
           PARTICLES
        ========================= */

        .particles{
            position:fixed;
            inset:0;
            overflow:hidden;
            pointer-events:none;
            z-index:-1;
        }

        .particle{
            position:absolute;
            border-radius:50%;
            background:linear-gradient(135deg,var(--primary),var(--primary-2));
            box-shadow:
                0 0 12px rgba(124,77,255,.7),
                0 0 24px rgba(0,229,255,.5);
            animation:float linear infinite;
        }

        @keyframes float{
            0%{
                transform:translateY(100vh) rotate(0deg);
                opacity:0;
            }
            10%{
                opacity:1;
            }
            90%{
                opacity:1;
            }
            100%{
                transform:translateY(-120vh) rotate(720deg);
                opacity:0;
            }
        }

        /* =========================
           GLASS
        ========================= */

        .glass-card{
            background:var(--card-bg);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);

            border:1px solid var(--card-border);

            box-shadow:var(--shadow);

            border-radius:24px;

            position:relative;
            overflow:hidden;
        }

        .glass-card::before{
            content:'';
            position:absolute;
            inset:0;
            background:
                linear-gradient(
                    120deg,
                    rgba(255,255,255,.08),
                    transparent 40%
                );
            pointer-events:none;
        }

        /* =========================
           NAVBAR
        ========================= */

        .navbar{
            position:fixed;
            top:0;
            width:100%;
            padding:1rem 2rem;
            z-index:1000;

            background:rgba(5,8,22,.72);
            backdrop-filter:blur(18px);

            border-bottom:1px solid rgba(255,255,255,.06);
        }

        .navbar-container{
            max-width:1300px;
            margin:auto;

            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:1rem;
            text-decoration:none;
        }

        .logo-icon{
            width:54px;
            height:54px;

            border-radius:18px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.25),
                    rgba(0,229,255,.2)
                );

            border:1px solid rgba(255,255,255,.12);

            font-size:1.45rem;

            color:#fff;

            box-shadow:
                0 0 30px rgba(124,77,255,.35);

            animation:logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse{
            0%,100%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.08);
            }
        }

        .logo-text{
            font-size:1.35rem;
            font-weight:800;

            background:linear-gradient(
                135deg,
                #fff,
                var(--primary-2),
                var(--primary)
            );

            -webkit-background-clip:text;
            background-clip:text;

            color:transparent;

            letter-spacing:1px;
        }

        .menu{
            display:flex;
            gap:1rem;
            align-items:center;
        }

        .menu-link{
            text-decoration:none;
            color:var(--text-muted);

            padding:.9rem 1.2rem;

            border-radius:14px;

            display:flex;
            align-items:center;
            gap:.6rem;

            font-size:.92rem;
            font-weight:600;

            position:relative;

            transition:var(--transition);
        }

        .menu-link::before{
            content:'';
            position:absolute;
            inset:0;
            border-radius:14px;

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.14),
                    rgba(0,229,255,.08)
                );

            opacity:0;
            transition:var(--transition);
        }

        .menu-link:hover{
            color:#fff;
            transform:translateY(-3px);
        }

        .menu-link:hover::before{
            opacity:1;
        }

        .menu-toggle{
            display:none;

            width:52px;
            height:52px;

            border:none;
            border-radius:16px;

            background:rgba(255,255,255,.05);

            color:#fff;

            font-size:1.3rem;

            cursor:pointer;

            transition:var(--transition);
        }

        .menu-toggle:hover{
            background:rgba(124,77,255,.2);
        }

        /* =========================
           HERO
        ========================= */

        .hero{
            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            text-align:center;

            padding:
                9rem 2rem 4rem;

            position:relative;
        }

        .hero-content{
            max-width:1000px;
            position:relative;
            z-index:1;
        }

        .hero-badge{
            display:inline-flex;
            align-items:center;
            gap:.7rem;

            padding:.85rem 1.4rem;

            border-radius:999px;

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.18),
                    rgba(0,229,255,.08)
                );

            border:1px solid rgba(255,255,255,.08);

            font-size:.9rem;
            font-weight:600;

            color:#dbe9ff;

            margin-bottom:2rem;

            box-shadow:
                0 0 25px rgba(124,77,255,.18);

            animation:fadeInUp .8s ease;
        }

        .hero-title{
            font-size:clamp(3rem,7vw,6rem);
            line-height:1.05;
            font-weight:900;

            margin-bottom:1.8rem;

            animation:fadeInUp .8s ease .2s both;
        }

        .hero-title .gradient{
            background:
                linear-gradient(
                    135deg,
                    #fff 0%,
                    var(--primary-2) 35%,
                    var(--primary) 70%,
                    var(--accent) 100%
                );

            -webkit-background-clip:text;
            background-clip:text;

            color:transparent;

            text-shadow:
                0 0 40px rgba(124,77,255,.4);
        }

        .hero-subtitle{
            max-width:760px;
            margin:auto auto 2.8rem;

            font-size:1.15rem;

            color:var(--text-muted);

            line-height:1.9;

            animation:fadeInUp .8s ease .4s both;
        }

        .hero-buttons{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:1rem;

            animation:fadeInUp .8s ease .6s both;
        }

        /* =========================
           BUTTONS
        ========================= */

        .btn{
            position:relative;

            padding:1rem 2rem;

            border:none;
            border-radius:18px;

            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:.8rem;

            font-family:'Orbitron',sans-serif;
            font-size:.92rem;
            font-weight:700;

            text-decoration:none;

            cursor:pointer;

            overflow:hidden;

            transition:var(--transition);
        }

        .btn::before{
            content:'';
            position:absolute;
            inset:0;

            background:
                linear-gradient(
                    120deg,
                    rgba(255,255,255,.2),
                    transparent 40%
                );

            transform:translateX(-120%);
            transition:.7s;
        }

        .btn:hover::before{
            transform:translateX(120%);
        }

        .btn-primary{
            color:#fff;

            background:
                linear-gradient(
                    135deg,
                    var(--primary),
                    var(--primary-2)
                );

            box-shadow:
                0 10px 35px rgba(124,77,255,.4);
        }

        .btn-primary:hover{
            transform:translateY(-4px) scale(1.03);

            box-shadow:
                0 18px 50px rgba(124,77,255,.5);
        }

        .btn-secondary{
            color:#fff;

            background:rgba(255,255,255,.04);

            border:1px solid rgba(255,255,255,.1);
        }

        .btn-secondary:hover{
            transform:translateY(-4px);

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.18),
                    rgba(0,229,255,.12)
                );
        }

        /* =========================
           STATS
        ========================= */

        .hero-stats{
            margin-top:4rem;

            display:grid;
            grid-template-columns:repeat(3,1fr);

            gap:1.5rem;
        }

        .stat{
            padding:2rem 1rem;

            border-radius:24px;

            background:var(--card-bg-2);

            border:1px solid rgba(255,255,255,.06);

            backdrop-filter:blur(18px);

            transition:var(--transition);
        }

        .stat:hover{
            transform:translateY(-6px);

            border-color:rgba(124,77,255,.25);

            box-shadow:
                0 20px 40px rgba(0,0,0,.3);
        }

        .stat-value{
            font-family:'Orbitron',sans-serif;
            font-size:clamp(1.8rem,5vw,2.6rem);
            font-weight:900;

            background:
                linear-gradient(
                    135deg,
                    var(--primary-2),
                    var(--primary)
                );

            -webkit-background-clip:text;
            background-clip:text;

            color:transparent;
        }

        .stat-label{
            margin-top:.5rem;

            font-size:.92rem;
            color:var(--text-muted);
        }

        /* =========================
           SCROLL INDICATOR
        ========================= */

        .scroll-indicator{
            position:absolute;
            bottom:2rem;
            left:50%;
            transform:translateX(-50%);
            animation:bounce 2s infinite;
        }

        .scroll-indicator-inner{
            width:28px;
            height:46px;

            border:2px solid rgba(255,255,255,.25);

            border-radius:20px;

            display:flex;
            justify-content:center;

            padding-top:7px;
        }

        .scroll-indicator-dot{
            width:6px;
            height:12px;

            border-radius:10px;

            background:
                linear-gradient(
                    180deg,
                    var(--primary-2),
                    var(--primary)
                );

            animation:scroll-dot 2s infinite;
        }

        @keyframes bounce{
            0%,100%{
                transform:translateX(-50%) translateY(0);
            }
            50%{
                transform:translateX(-50%) translateY(10px);
            }
        }

        @keyframes scroll-dot{
            0%,100%{
                opacity:1;
                transform:translateY(0);
            }
            50%{
                opacity:.4;
                transform:translateY(10px);
            }
        }

        /* =========================
           FEATURES
        ========================= */

        .features{
            max-width:1300px;
            margin:auto;

            padding:6rem 2rem;
        }

        .section-header{
            text-align:center;
            margin-bottom:4rem;
        }

        .section-title{
            font-size:clamp(2rem,5vw,3.5rem);

            margin-bottom:1rem;

            background:
                linear-gradient(
                    135deg,
                    #fff,
                    var(--primary-2),
                    var(--primary)
                );

            -webkit-background-clip:text;
            background-clip:text;

            color:transparent;
        }

        .section-subtitle{
            max-width:650px;
            margin:auto;

            color:var(--text-muted);

            font-size:1.08rem;
        }

        .features-grid{
            display:grid;
            grid-template-columns:
                repeat(auto-fit,minmax(320px,1fr));

            gap:1.8rem;
        }

        .feature-card{
            padding:2rem;

            text-decoration:none;
            color:inherit;

            transition:var(--transition);

            position:relative;
        }

        .feature-card:hover{
            transform:
                translateY(-10px)
                scale(1.02);

            border-color:
                rgba(124,77,255,.22);

            box-shadow:
                0 25px 60px rgba(0,0,0,.4),
                0 0 40px rgba(124,77,255,.18);
        }

        .feature-icon{
            width:72px;
            height:72px;

            border-radius:22px;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:1.8rem;

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.22),
                    rgba(0,229,255,.12)
                );

            border:1px solid rgba(255,255,255,.08);

            color:#fff;

            margin-bottom:1.5rem;

            transition:var(--transition);
        }

        .feature-card:hover .feature-icon{
            transform:
                rotate(-4deg)
                scale(1.08);
        }

        .feature-title{
            font-size:1.3rem;
            font-weight:700;

            margin-bottom:.9rem;

            transition:var(--transition);
        }

        .feature-card:hover .feature-title{
            color:var(--primary-2);
        }

        .feature-description{
            color:var(--text-muted);

            line-height:1.8;

            font-size:.96rem;
        }

        .feature-arrow{
            margin-top:1.6rem;

            display:flex;
            align-items:center;
            gap:.5rem;

            color:var(--primary-2);

            opacity:0;

            transform:translateX(-10px);

            transition:var(--transition);
        }

        .feature-card:hover .feature-arrow{
            opacity:1;
            transform:translateX(0);
        }

        /* =========================
           CTA
        ========================= */

        .cta{
            position:relative;

            padding:7rem 2rem;

            overflow:hidden;
        }

        .cta::before{
            content:'';
            position:absolute;
            inset:0;

            background:
                radial-gradient(
                    circle at center,
                    rgba(124,77,255,.12),
                    transparent 55%
                );

            z-index:-1;
        }

        .cta-content{
            max-width:850px;
            margin:auto;

            text-align:center;
        }

        .cta-icon{
            width:90px;
            height:90px;

            margin:auto auto 2rem;

            border-radius:28px;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:2.5rem;

            color:#fff;

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.3),
                    rgba(0,229,255,.22)
                );

            border:1px solid rgba(255,255,255,.08);

            box-shadow:
                0 0 40px rgba(124,77,255,.25);

            animation:logoPulse 3s infinite ease-in-out;
        }

        .cta-title{
            font-size:clamp(2rem,5vw,3.4rem);
            line-height:1.2;

            margin-bottom:1.5rem;
        }

        .cta-title .gradient{
            background:
                linear-gradient(
                    135deg,
                    var(--primary-2),
                    var(--primary)
                );

            -webkit-background-clip:text;
            background-clip:text;

            color:transparent;
        }

        .cta-text{
            max-width:760px;
            margin:auto auto 2.5rem;

            color:var(--text-muted);

            line-height:1.9;

            font-size:1.05rem;
        }

        /* =========================
           FOOTER
        ========================= */

        footer{
            padding:5rem 2rem 2rem;

            border-top:
                1px solid rgba(255,255,255,.06);

            background:
                rgba(2,4,13,.88);

            backdrop-filter:blur(12px);
        }

        .footer-content{
            max-width:1300px;
            margin:auto;

            display:grid;
            grid-template-columns:
                repeat(auto-fit,minmax(220px,1fr));

            gap:3rem;
        }

        .footer-brand{
            max-width:320px;
        }

        .footer-logo{
            display:flex;
            align-items:center;
            gap:.9rem;

            text-decoration:none;

            margin-bottom:1rem;
        }

        .footer-logo-icon{
            width:52px;
            height:52px;

            border-radius:18px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.25),
                    rgba(0,229,255,.18)
                );

            color:#fff;
        }

        .footer-logo-text{
            font-size:1.2rem;
            font-weight:800;

            background:
                linear-gradient(
                    135deg,
                    #fff,
                    var(--primary-2)
                );

            -webkit-background-clip:text;
            background-clip:text;

            color:transparent;
        }

        .footer-description{
            color:var(--text-muted);
            line-height:1.8;
            font-size:.95rem;
        }

        .footer-social{
            display:flex;
            gap:.9rem;

            margin-top:1.5rem;
        }

        .social-link{
            width:44px;
            height:44px;

            border-radius:14px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:rgba(255,255,255,.04);

            color:var(--text-muted);

            text-decoration:none;

            transition:var(--transition);
        }

        .social-link:hover{
            transform:translateY(-4px);

            background:
                linear-gradient(
                    135deg,
                    rgba(124,77,255,.25),
                    rgba(0,229,255,.18)
                );

            color:#fff;
        }

        .footer-column h3{
            font-size:1rem;
            margin-bottom:1.5rem;

            position:relative;
            display:inline-block;
        }

        .footer-column h3::after{
            content:'';
            position:absolute;
            left:0;
            bottom:-8px;

            width:40px;
            height:3px;

            border-radius:10px;

            background:
                linear-gradient(
                    90deg,
                    var(--primary),
                    var(--primary-2)
                );
        }

        .footer-menu{
            list-style:none;
        }

        .footer-menu-item{
            margin-bottom:1rem;
        }

        .footer-menu-link{
            text-decoration:none;

            color:var(--text-muted);

            display:flex;
            align-items:center;
            gap:.6rem;

            transition:var(--transition);
        }

        .footer-menu-link:hover{
            color:#fff;
            transform:translateX(6px);
        }

        .copyright{
            margin-top:4rem;
            padding-top:2rem;

            border-top:
                1px solid rgba(255,255,255,.06);

            text-align:center;

            color:var(--text-muted);

            display:flex;
            align-items:center;
            justify-content:center;
            gap:.5rem;

            flex-wrap:wrap;
        }

        .copyright a{
            color:var(--primary-2);
            text-decoration:none;
            font-weight:700;
        }

        .copyright .heart{
            color:var(--accent);
        }

        /* =========================
           RIGHT CLICK
        ========================= */

        #rightClickMessage{
            display:none;

            position:fixed;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            padding:1rem 2rem;

            border-radius:18px;

            background:
                rgba(15,18,35,.9);

            border:
                1px solid rgba(255,255,255,.08);

            backdrop-filter:blur(20px);

            color:#fff;

            z-index:9999;

            box-shadow:
                0 0 40px rgba(124,77,255,.25);

            font-family:'Orbitron',sans-serif;
        }

        /* =========================
           ANIMATIONS
        ========================= */

        @keyframes fadeInUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .animate-on-scroll{
            opacity:0;
            transform:translateY(40px);
            transition:all .8s ease;
        }

        .animate-on-scroll.visible{
            opacity:1;
            transform:translateY(0);
        }

        /* =========================
           MOBILE
        ========================= */

        @media(max-width:768px){

            .navbar{
                padding:1rem 1.2rem;
            }

            .menu{
                position:fixed;

                top:0;
                left:-100%;

                width:85%;
                max-width:320px;
                height:100vh;

                flex-direction:column;
                align-items:flex-start;

                padding:7rem 1.5rem;

                background:
                    rgba(5,8,22,.98);

                backdrop-filter:blur(20px);

                border-right:
                    1px solid rgba(255,255,255,.06);

                transition:var(--transition);

                z-index:1001;
            }

            .menu.active{
                left:0;
            }

            .menu-link{
                width:100%;
            }

            .menu-toggle{
                display:flex;
                align-items:center;
                justify-content:center;
            }

            .hero{
                padding:
                    8rem 1.4rem 4rem;
            }
